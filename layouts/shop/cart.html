{{ define "main" }}
<div class="puget-page puget-cart-page">
  <div class="puget-page-inner">
    <h1 class="puget-page-title">Your Cart</h1>

    <!-- Empty cart state -->
    <div class="puget-cart-empty" data-gsg-cart-empty>
      <div class="puget-empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
      </div>
      <p class="puget-empty-message">Your cart is empty.</p>
      <a href="/plugins/" class="puget-btn puget-btn-secondary">Browse Plugins</a>
    </div>

    <!-- Cart items -->
    <div class="puget-cart-contents" data-gsg-cart-contents style="display:none;">
      <div class="puget-cart-items" data-gsg-cart-items>
        <!-- Items rendered by JS -->
      </div>

      <div class="puget-cart-summary">
        <div class="puget-cart-summary-row puget-cart-total-row">
          <span class="puget-cart-total-label">Total</span>
          <span class="puget-cart-total-amount" data-gsg-cart-total>$0.00</span>
        </div>
        <a href="/checkout/" class="puget-btn puget-btn-primary puget-checkout-btn">Proceed to Checkout</a>
        <a href="/plugins/" class="puget-continue-shopping">Continue Shopping</a>
      </div>
    </div>
  </div>
</div>
{{ end }}
