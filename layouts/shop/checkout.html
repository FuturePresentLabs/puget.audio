{{ define "main" }}
<div class="puget-page puget-checkout-page">
  <div class="puget-page-inner">
    <h1 class="puget-page-title">Checkout</h1>

    <!-- Empty cart redirect -->
    <div class="puget-checkout-empty" data-gsg-checkout-empty style="display:none;">
      <p>Your cart is empty.</p>
      <a href="/plugins/" class="puget-btn puget-btn-secondary">Browse Plugins</a>
    </div>

    <div class="puget-checkout-layout" data-gsg-checkout-layout>
      <!-- Order summary sidebar -->
      <aside class="puget-checkout-summary">
        <h2 class="puget-checkout-summary-title">Order Summary</h2>
        <div class="puget-checkout-items" data-gsg-checkout-items>
          <!-- Rendered by JS -->
        </div>
        <div class="puget-checkout-summary-total">
          <span>Total</span>
          <span data-gsg-checkout-total>$0.00</span>
        </div>
      </aside>

      <!-- Checkout form -->
      <div class="puget-checkout-form-wrap">
        <form class="puget-checkout-form" data-gsg-checkout-form>
          <fieldset class="puget-fieldset">
            <legend class="puget-legend">Contact Information</legend>
            <div class="puget-field">
              <label for="puget-email" class="puget-label">Email</label>
              <input type="email" id="puget-email" name="email" required class="puget-input" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="puget-field-row">
              <div class="puget-field">
                <label for="puget-first-name" class="puget-label">First Name</label>
                <input type="text" id="puget-first-name" name="first_name" required class="puget-input" autocomplete="given-name">
              </div>
              <div class="puget-field">
                <label for="puget-last-name" class="puget-label">Last Name</label>
                <input type="text" id="puget-last-name" name="last_name" required class="puget-input" autocomplete="family-name">
              </div>
            </div>
          </fieldset>

          <fieldset class="puget-fieldset">
            <legend class="puget-legend">Payment</legend>
            <div class="puget-field">
              <label for="puget-card-number" class="puget-label">Card Number</label>
              <input type="text" id="puget-card-number" name="card_number" required class="puget-input" placeholder="4242 4242 4242 4242" autocomplete="cc-number" inputmode="numeric" maxlength="19">
            </div>
            <div class="puget-field-row">
              <div class="puget-field">
                <label for="puget-card-expiry" class="puget-label">Expiration</label>
                <input type="text" id="puget-card-expiry" name="card_expiry" required class="puget-input" placeholder="MM / YY" autocomplete="cc-exp" inputmode="numeric" maxlength="7">
              </div>
              <div class="puget-field">
                <label for="puget-card-cvc" class="puget-label">CVC</label>
                <input type="text" id="puget-card-cvc" name="card_cvc" required class="puget-input" placeholder="123" autocomplete="cc-csc" inputmode="numeric" maxlength="4">
              </div>
            </div>
          </fieldset>

          <div class="puget-checkout-error" data-gsg-checkout-error style="display:none;"></div>

          <button type="submit" class="puget-btn puget-btn-primary puget-place-order-btn" data-gsg-place-order>
            <span class="puget-btn-text">Place Order</span>
            <span class="puget-btn-loading" style="display:none;">Processing...</span>
          </button>

          <p class="puget-checkout-secure">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Secure checkout. Your payment info is encrypted.
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
{{ end }}
