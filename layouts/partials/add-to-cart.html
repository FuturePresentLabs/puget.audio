{{/* Add to Cart Button - GSG Ecommerce compatible */}}
{{ $productType := partial "product-type.html" .sku }}
<button
  class="puget-add-to-cart {{ .class }}"
  data-add-to-cart
  data-sku="{{ .sku }}"
  data-title="{{ .title }}"
  data-price-cents="{{ mul .price 100 }}"
  data-product-type="{{ $productType }}"
  {{ with .image }}data-image="{{ . }}"{{ end }}
>
  {{ .label }}
</button>

<style>
.puget-add-to-cart {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.875rem 1.5rem;
  font-size: 0.9375rem;
  font-weight: 500;
  text-decoration: none;
  border-radius: var(--gsg-radius);
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: var(--accent);
  color: var(--bg-primary);
}

.puget-add-to-cart:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px var(--accent-glow);
}

.puget-add-to-cart:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.puget-add-to-cart.btn-sm {
  padding: 0.625rem 1rem;
  font-size: 0.875rem;
}

.puget-add-to-cart.btn-lg {
  padding: 1rem 2rem;
  font-size: 1rem;
}
</style>
