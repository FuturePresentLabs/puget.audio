{{- $id := .id -}}
<div class="review-modal hidden" id="{{ $id }}" role="dialog" aria-modal="true" aria-labelledby="{{ $id }}-title">
  <div class="review-modal__backdrop" data-review-close></div>
  <div class="review-modal__dialog" role="document">
    <button class="review-modal__close" type="button" data-review-close aria-label="Close review form">×</button>
    <h3 class="review-modal__title" id="{{ $id }}-title">Get your review link</h3>
    <p class="review-modal__intro">Enter the email you used at checkout. If we’ve shipped to that address we’ll email you a secure link to add or update reviews.</p>
    <form class="review-form review-form--request" data-review-form data-review-mode="request">
      <label class="review-form__label">
        Email
        <input type="email" name="email" required placeholder="you@example.com" autocomplete="email">
      </label>
      <div class="review-form__actions">
        <button type="submit" class="btn" data-review-submit data-review-prefill-label="Email me a link">Email me a link</button>
        <button type="button" class="btn btn-secondary" data-review-close>Cancel</button>
      </div>
      <p class="review-form__message muted" data-review-message></p>
    </form>
  </div>
</div>
