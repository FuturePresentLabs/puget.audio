baseURL = 'https://puget.audio'
languageCode = 'en-us'
title = 'Puget Audio'
theme = ['puget-theme', 'gsg-ecommerce']

[params]
  tagline = "The sound of analog. Without the cost."
  description = "Analog-authentic plugins, samples, and hardware from Seattle. We simulate analog when it makes music better — and sample it when nothing else will do."
  selling = true
  stock_display_cap = 50
  currency = "USD"

  [params.brand]
    name = "Puget Audio"
    key = "puget"
    logo = "/images/puget-logo.svg"

  [params.seo]
    description = "Analog-authentic audio tools from Seattle. Sample packs recorded through real analog hardware, circuit-accurate Wave Digital Filter plugins, and custom Eurorack gear — without the 2026 price of the original iron."
    keywords = ["analog sample pack", "moog dfam samples", "eurorack case", "analog emulation", "VST3 plugins", "wave digital filter", "analog simulation", "analog sampling", "puget audio", "seattle audio"]

  [params.social]
    image = "/images/puget-og.jpg"
    twitter = "@pugetaudio"

  [params.api]
    base = "https://api.gsgmfg.com"

  [params.fluidpay]
    # Load the production tokenizer — the one that the GSG integration
    # guide specifies (https://app.fluidpay.com). The publicKey is the
    # one the backend hands us.
    tokenizerScript = "https://app.fluidpay.com/tokenizer/tokenizer.js"
    tokenizerUrl = "https://app.fluidpay.com"
    publicKey = "pub_35zRVjKCm725NDB6aBY19E8ACkQ"

[menu]
  [[menu.main]]
    name = 'Sample Packs'
    url = '/sample-packs/'
    weight = 10

  [[menu.main]]
    name = 'Hardware'
    url = '/hardware/'
    weight = 20

  [[menu.main]]
    name = 'Plugins'
    url = '/plugins/'
    weight = 30

  [[menu.main]]
    name = 'Blog'
    url = '/blog/'
    weight = 40

[taxonomies]
  tag = 'tags'

[build]
  writeStats = true
